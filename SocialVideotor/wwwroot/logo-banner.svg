<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="SocialVideotor banner">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052769"/>
      <stop offset="100%" stop-color="#3a0647"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="wordmarkAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bannerBg)"/>

  <!-- Subtle radial glow behind icon -->
  <ellipse cx="160" cy="160" rx="200" ry="180" fill="#4F46E5" opacity="0.12"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="320" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="320" stroke="white" stroke-width="0.5" opacity="0.04"/>

  <!-- Logo icon (rounded square) -->
  <rect x="48" y="60" width="200" height="200" rx="38" fill="url(#iconBg)"/>
  <rect x="48" y="60" width="200" height="200" rx="38" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>

  <!-- Play triangle inside icon -->
  <polygon points="120,112 120,208 212,160" fill="white" opacity="0.95"/>

  <!-- Accent bar below icon -->
  <rect x="68" y="243" width="160" height="5" rx="2.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Three dots below icon -->
  <circle cx="108" cy="267" r="9" fill="white" opacity="0.55"/>
  <circle cx="148" cy="267" r="9" fill="white" opacity="0.55"/>
  <circle cx="188" cy="267" r="9" fill="white" opacity="0.55"/>
  <line x1="117" y1="267" x2="139" y2="267" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="157" y1="267" x2="179" y2="267" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- Wordmark: "Social" -->
  <text
    x="286"
    y="174"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="80"
    font-weight="700"
    letter-spacing="-2"
    fill="white"
  >Social</text>

  <!-- Wordmark: "Videotor" (accent color) -->
  <text
    x="612"
    y="174"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="80"
    font-weight="700"
    letter-spacing="-2"
    fill="#A78BFA"
  >Videotor</text>

  <!-- Tagline -->
  <text
    x="288"
    y="220"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="1"
    fill="white"
    opacity="0.55"
  >AI-powered social media video clips</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="308" width="1200" height="12" rx="0" fill="url(#accentGrad)"/>
</svg>
