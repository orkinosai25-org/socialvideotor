<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 680" width="512" height="680" role="img" aria-label="SocialVideotor logo">
  <defs>
    <linearGradient id="logoBackground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (icon area) -->
  <rect width="512" height="512" rx="100" fill="url(#logoBackground)"/>

  <!-- Subtle inner highlight ring -->
  <rect width="512" height="512" rx="100" fill="none" stroke="white" stroke-width="3" opacity="0.12"/>

  <!-- Play button circle backdrop -->
  <circle cx="256" cy="232" r="130" fill="white" opacity="0.08"/>

  <!-- Play button triangle -->
  <polygon points="212,164 212,300 352,232" fill="white" opacity="0.95"/>

  <!-- Accent divider bar -->
  <rect x="96" y="374" width="320" height="6" rx="3" fill="url(#logoAccent)" opacity="0.85"/>

  <!-- Three platform indicator dots -->
  <circle cx="168" cy="418" r="16" fill="white" opacity="0.65"/>
  <circle cx="256" cy="418" r="16" fill="white" opacity="0.65"/>
  <circle cx="344" cy="418" r="16" fill="white" opacity="0.65"/>

  <!-- Connector lines between dots -->
  <line x1="184" y1="418" x2="240" y2="418" stroke="white" stroke-width="2" opacity="0.35"/>
  <line x1="272" y1="418" x2="328" y2="418" stroke="white" stroke-width="2" opacity="0.35"/>

  <!-- Product name: "Social" (indigo) + "Videotor" (violet) -->
  <text
    x="256"
    y="568"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="800"
    letter-spacing="-1.5"
  >
    <tspan fill="#4F46E5">Social</tspan><tspan fill="#7C3AED">Videotor</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="256"
    y="624"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="0.5"
    fill="#6B7280"
  >AI-powered social media video clips</text>
</svg>
